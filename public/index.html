<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PopChat</title>
  <style>
    body{background:#000;color:#fff;font-family:system-ui,Segoe UI,Roboto,Arial;margin:0;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;}
    h1{font-size:28px;margin:0 0 18px}
    #controls{display:flex;flex-direction:column;align-items:center;gap:10px}
    button{padding:12px 24px;border-radius:24px;border:none;background:#6b6f72;color:#fff;font-weight:600;cursor:pointer}
    #videos{margin-top:18px;display:flex;gap:12px;align-items:center;justify-content:center}
    video{width:320px;height:240px;border-radius:6px;background:#111;object-fit:cover}
    #status{margin-top:12px;color:#ddd}
  </style>
</head>
<body>
  <h1>PopChat</h1>
  <div id="controls">
    <button id="popNow">Connecting...</button>
    <div id="status" aria-live="polite"></div>
  </div>

  <div id="videos">
    <video id="localVideo" autoplay playsinline muted></video>
    <video id="remoteVideo" autoplay playsinline></video>
  </div>

  <div style="position:fixed;left:12px;bottom:12px">
    <button id="nextButton" style="padding:8px 12px;border-radius:6px;background:#222;color:#fff;border:1px solid #444">Next</button>
  </div>

  <script src="index.js"></script>
</body>
</html>
